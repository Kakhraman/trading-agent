<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" ng-app="tradingApp" ng-controller="ShellController as shell">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trading Bot Dashboard</title>
  <base href="/" />
  <link href="/assets/fonts/google/fonts.css" rel="stylesheet" />
  <link href="/assets/vendor/bootstrap/bootstrap.min.css" rel="stylesheet" />
  <link href="/assets/css/main.css" rel="stylesheet" />
</head>
<body ng-cloak>
  <div class="offline-banner text-center px-3 py-2" ng-if="shell.offline">
    Server offline. Make sure <code>npm start</code> is running, then refresh.
  </div>

  <nav class="navbar navbar-expand-lg app-navbar sticky-top">
    <div class="container-fluid app-nav-container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/dashboard" ng-click="shell.closeMenu()">
        <span class="brand-mark">TB</span>
        <span class="brand-copy">
          <span class="brand-title">Trading Bot</span>
          <span class="brand-subtitle">Spot testnet control</span>
        </span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#appNav"
        aria-controls="appNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="appNav">
        <ul class="navbar-nav ms-lg-4 gap-lg-1">
          <li class="nav-item" ng-repeat="route in shell.routes">
            <a class="nav-link" ng-class="{ active: shell.isActive(route.path) }"
              ng-href="{{ route.path }}" ng-click="shell.closeMenu()">{{ route.label }}</a>
          </li>
        </ul>

        <div class="ms-lg-auto mt-3 mt-lg-0 d-flex flex-wrap align-items-center gap-2">
          <span class="status-pill"
            ng-class="shell.status && shell.status.isRunning ? 'status-running' : 'status-idle'">
            {{ shell.status && shell.status.isRunning ? 'Bot running' : 'Bot stopped' }}
          </span>
        </div>
      </div>
    </div>
  </nav>

  <main class="container-fluid app-shell py-4">
    <div ng-view class="route-view"></div>
  </main>

  <div class="toast-container position-fixed top-0 end-0 p-3 app-toast-container">
    <div class="toast show border-0 shadow-lg mb-2" role="alert" aria-live="assertive" aria-atomic="true"
      ng-repeat="toast in shell.toasts track by toast.id" ng-class="'toast-' + toast.type">
      <div class="d-flex">
        <div class="toast-body">
          <strong ng-if="toast.title">{{ toast.title }}</strong>
          <span ng-if="toast.title && toast.message"> - </span>
          <span>{{ toast.message }}</span>
        </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto"
          aria-label="Close" ng-click="shell.dismissToast(toast.id)"></button>
      </div>
    </div>
  </div>

  <script src="/assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
  <script src="/assets/vendor/angular/angular.min.js"></script>
  <script src="/assets/vendor/angular/angular-route.min.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/services.js"></script>
  <script src="/assets/js/controllers.js"></script>
</body>
</html>
